<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>eBay DW 字段搜索</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",system-ui,sans-serif;background:#eef1f6;min-height:100vh}

.header{background:linear-gradient(135deg,#0f2744 0%,#1a4a8a 60%,#2563c4 100%);padding:28px 0 36px;text-align:center;color:#fff;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(100,180,255,.08) 0%,transparent 70%);pointer-events:none}
.topbar{max-width:900px;margin:0 auto;padding:0 20px 14px;display:flex;justify-content:flex-end;gap:8px}
.topbar-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:.15s;letter-spacing:.3px}
.topbar-btn:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.4)}
.topbar-btn.accent{background:rgba(255,200,50,.15);border-color:rgba(255,200,50,.45);color:#ffd966}
.topbar-btn.accent:hover{background:rgba(255,200,50,.25)}
.header h1{font-size:26px;font-weight:700;letter-spacing:2px;margin-bottom:4px;text-shadow:0 1px 8px rgba(0,0,0,.25)}
.header-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:20px;letter-spacing:.5px}
.search-wrap{position:relative;max-width:660px;margin:0 auto}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:#aaa;pointer-events:none}
.search-wrap input{width:100%;padding:14px 46px 14px 46px;font-size:15px;border:none;border-radius:10px;outline:none;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:.2s}
.search-wrap input:focus{box-shadow:0 4px 24px rgba(37,99,196,.5)}
.clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:20px;color:#bbb;cursor:pointer;line-height:1;background:none;border:none}
.clear-btn:hover{color:#666}
.hint{margin-top:10px;font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.3px}
.key-status{margin-top:4px;font-size:11px;color:rgba(255,255,255,.4)}
.table-filter-wrap{max-width:660px;margin:14px auto 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.table-filter-wrap label{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap}
.table-select{padding:6px 12px;border:1px solid rgba(255,255,255,.3);border-radius:7px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;outline:none;cursor:pointer;max-width:380px;backdrop-filter:blur(4px)}
.table-select option{background:#1a3a5c;color:#fff}
.table-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35)}
.card{cursor:pointer}
.detail-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.detail-modal-bg.show{display:flex}
.detail-modal{background:#fff;border-radius:14px;padding:0;width:580px;max-width:95vw;max-height:87vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 50px rgba(0,0,0,.25)}
.detail-header{padding:22px 24px 15px;border-bottom:1px solid #f0f0f0;flex-shrink:0;background:linear-gradient(135deg,#f8faff,#fff)}
.detail-field-name{font-size:21px;font-weight:700;color:#1a1a2e;font-family:Consolas,monospace;margin-bottom:9px}
.detail-body{padding:20px 24px;overflow-y:auto;flex:1}
.detail-row{margin-bottom:16px}
.detail-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.detail-value{font-size:13px;color:#333;line-height:1.75}
.detail-ver{display:inline-block;padding:4px 10px;border-radius:5px;font-size:12px;margin-top:4px}
.detail-footer{padding:14px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;flex-shrink:0;background:#fafafa}
.syn-chip-detail{display:inline-block;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:5px;padding:3px 10px;font-size:12px;font-family:Consolas,monospace;color:#333;cursor:pointer;margin:2px}
.syn-chip-detail:hover{background:#e3f2fd;border-color:#90caf9}

.main{max-width:900px;margin:28px auto;padding:0 20px}
.count{font-size:12px;color:#999;margin-bottom:12px;padding:0 2px}

.card{background:#fff;border-radius:12px;padding:17px 22px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);border-left:4px solid #e0e5ef;transition:.18s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px);border-left-color:#4a90d9}
.card.has-group{border-left-color:#2e6db4}
.card-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.field-name{font-size:15px;font-weight:700;color:#1a1a2e;font-family:Consolas,monospace}
.table-tag{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.table-cn{font-size:11px;color:#aaa}
.group-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;background:#ebf0fe;color:#2553b0;font-weight:500}
.ver-badge{font-size:11px;padding:2px 8px;border-radius:5px;white-space:nowrap;font-weight:500}
.ver-ok{background:#e8f5e9;color:#2e7d32}
.ver-no{background:#ffebee;color:#c62828}
.ver-warn{background:#fff8e1;color:#f57f17}
.desc{margin-top:9px;font-size:13px;color:#555;line-height:1.65}
.synonyms{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.syn-label{font-size:11px;color:#bbb;margin-right:2px}
.syn-chip{display:inline-block;background:#f7f7f7;border:1px solid #e5e5e5;border-radius:5px;padding:2px 8px;font-size:11px;font-family:Consolas,monospace;color:#444;cursor:pointer;transition:.12s}
.syn-chip:hover{background:#e3f2fd;border-color:#90caf9;color:#1565c0}
.syn-tables{font-size:11px;color:#ccc}
mark{background:#fff176;border-radius:2px;padding:0 1px}

.empty{text-align:center;padding:60px 20px;color:#aaa}
.empty-icon{font-size:44px;margin-bottom:14px;filter:grayscale(.3)}

.assist-panel{background:#fff;border-radius:12px;padding:22px 24px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:10px}
.assist-panel h3{color:#1a3a5c;margin-bottom:12px;font-size:14px;font-weight:700}
.ai-suggestions .sug-item{padding:11px 15px;border:1px solid #eaeaea;border-radius:9px;margin-bottom:7px;cursor:pointer;transition:.14s}
.ai-suggestions .sug-item:hover{border-color:#2e6db4;background:#f5f9ff;box-shadow:0 2px 8px rgba(46,109,180,.08)}
.sug-field{font-family:Consolas,monospace;font-weight:700;color:#1a3a5c;font-size:13px}
.sug-reason{font-size:12px;color:#777;margin-top:3px}
.gen-panel{margin-top:15px;border-top:1px solid #f0f0f0;padding-top:15px}
.gen-panel textarea{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:7px;font-size:13px;resize:vertical;min-height:65px;outline:none;font-family:inherit;transition:.15s}
.gen-panel textarea:focus{border-color:#2e6db4;box-shadow:0 0 0 3px rgba(46,109,180,.1)}
.formula-box{background:#1e1e1e;border-radius:9px;padding:14px 14px 14px 16px;margin-top:8px;position:relative}
.formula-box pre{color:#d4d4d4;font-size:12px;font-family:Consolas,monospace;white-space:pre-wrap;word-break:break-all;line-height:1.55}
.formula-label{font-size:11px;color:#888;font-weight:700;margin:13px 0 5px;text-transform:uppercase;letter-spacing:.7px}
.copy-btn{position:absolute;top:8px;right:8px;background:#3c3c3c;border:none;color:#bbb;padding:3px 9px;border-radius:4px;font-size:11px;cursor:pointer;transition:.12s}
.copy-btn:hover{background:#555;color:#fff}

.btn{display:inline-block;padding:8px 18px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn-primary{background:#2563c4;color:#fff;box-shadow:0 2px 8px rgba(37,99,196,.25)}
.btn-primary:hover{background:#1a52a8;box-shadow:0 4px 12px rgba(37,99,196,.35)}
.btn-outline{background:#fff;border:1px solid #2563c4;color:#2563c4}
.btn-outline:hover{background:#f0f6ff}
.btn-sm{padding:5px 13px;font-size:12px}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#2563c4;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:380px;max-width:92vw;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal h3{margin-bottom:13px;color:#1a3a5c;font-size:15px;font-weight:700}
.modal input{width:100%;padding:9px 13px;border:1px solid #ddd;border-radius:7px;font-size:13px;outline:none;margin-bottom:8px;font-family:Consolas,monospace;transition:.15s}
.modal input:focus{border-color:#2563c4;box-shadow:0 0 0 3px rgba(37,99,196,.1)}
.modal-tip{font-size:11px;color:#aaa;margin-bottom:15px;line-height:1.6}
.modal-row{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<div class="header">
  <div class="topbar">
    <span id="ai-badge" class="key-status"></span>
    <button class="topbar-btn accent" onclick="openGenModal()">⚡ 公式生成器</button>
    <button class="topbar-btn" onclick="openKeyModal()">⚙ 接口配置</button>
  </div>
  <h1>eBay DW 字段搜索</h1>
  <div class="header-sub">Data Warehouse · 数据字典</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="q" type="text" placeholder="输入字段名或中文含义，如：卖家、运费、seller_id …"
           oninput="onSearch()" autocomplete="off">
    <button class="clear-btn" onclick="clearSearch()">×</button>
  </div>
  <div class="hint">支持中英文 · 点击同义字段可跳转 · 共 <span id="total" style="font-weight:600;color:#fff">…</span> 个字段</div>
  <div class="table-filter-wrap">
    <label>筛选数据表：</label>
    <select id="table-filter" class="table-select" onchange="onTableChange()">
      <option value="">全部表</option>
    </select>
    <span id="table-field-count" style="font-size:11px;color:rgba(255,255,255,.5)"></span>
  </div>
</div>

<div class="main" id="main">
  <div class="empty">
    <div class="empty-icon">🔍</div>
    <div>在上方输入字段名或中文关键词开始搜索</div>
    <div style="font-size:12px;margin-top:6px;color:#ccc">支持字段名 · 中文含义 · 同义词联想</div>
  </div>
</div>

<!-- Generate modal -->
<div class="modal-bg" id="gen-modal">
  <div class="modal" style="width:500px">
    <h3>⚡ 公式生成器</h3>
    <div style="font-size:12px;color:#999;margin-bottom:10px">描述你需要的指标，自动生成 Spark SQL + Tableau 计算字段</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <label style="font-size:12px;color:#666;white-space:nowrap">指定数据表：</label>
      <select id="table-filter-modal" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none;">
        <option value="">全部表（自动选择字段）</option>
      </select>
    </div>
    <textarea id="gen-desc-modal" placeholder="例如：按卖家维度统计近7天成交额（美元）&#10;例如：计算每个 listing 的转化率（成交数/曝光数）&#10;例如：统计 GMV 同比增长率"
      style="width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:7px;font-size:13px;resize:vertical;min-height:85px;outline:none;font-family:inherit;margin-bottom:10px"></textarea>
    <div id="gen-modal-result"></div>
    <div class="modal-row">
      <button class="btn btn-outline btn-sm" onclick="closeGenModal()">关闭</button>
      <button class="btn btn-primary btn-sm" id="gen-modal-btn" onclick="aiGenerateModal()">生成公式</button>
    </div>
  </div>
</div>

<!-- Field detail modal -->
<div class="detail-modal-bg" id="detail-modal" onclick="if(event.target===this)closeFieldDetail()">
  <div class="detail-modal">
    <div class="detail-header">
      <div class="detail-field-name" id="dm-field"></div>
      <div id="dm-badges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">字段含义</div>
        <div class="detail-value" id="dm-desc"></div>
      </div>
      <div class="detail-row" id="dm-group-row">
        <div class="detail-label">分组</div>
        <div class="detail-value" id="dm-group"></div>
      </div>
      <div class="detail-row" id="dm-ver-row">
        <div class="detail-label">验证结论</div>
        <div class="detail-value" id="dm-ver"></div>
      </div>
      <div class="detail-row" id="dm-syn-row">
        <div class="detail-label">同义字段（点击跳转）</div>
        <div class="detail-value" id="dm-syn"></div>
      </div>
      <div class="detail-row" style="background:#f9f9f9;border-radius:6px;padding:10px 12px">
        <div class="detail-label" style="margin-bottom:2px">样本数据</div>
        <div style="font-size:12px;color:#aaa">可在 Muse Data Lake Studio 执行 SELECT * FROM <span id="dm-table-name" style="font-family:Consolas;color:#888"></span> LIMIT 10 查看</div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-outline btn-sm" onclick="closeFieldDetail()">关闭</button>
    </div>
  </div>
</div>

<!-- Key modal -->
<div class="modal-bg" id="key-modal">
  <div class="modal">
    <h3>接口配置</h3>
    <input id="sf-key" type="password" placeholder="sk-…">
    <div class="modal-tip">Key 仅保存在本地浏览器，不会上传到任何服务器。</div>
    <div class="modal-row">
      <button class="btn btn-outline btn-sm" onclick="closeKeyModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<script>
let FIELDS = [];
let debounceTimer;

// ── init ──────────────────────────────────────────────────────────────
fetch("fields.json")
  .then(r => r.json())
  .then(data => {
    FIELDS = data;
    document.getElementById("total").textContent = FIELDS.length;
    buildTableOptions();
  });

function buildTableOptions(){
  const tables = [];
  const seen = new Set();
  FIELDS.forEach(f=>{
    if(!seen.has(f.table)){
      seen.add(f.table);
      tables.push({table:f.table, table_cn:f.table_cn||"", color:f.table_color||"#888"});
    }
  });
  const makeOpts = (selId) => {
    const sel = document.getElementById(selId);
    if(!sel) return;
    tables.forEach(t=>{
      const cnt = FIELDS.filter(f=>f.table===t.table).length;
      const opt = document.createElement("option");
      opt.value = t.table;
      opt.textContent = `${t.table}（${t.table_cn}）— ${cnt}个字段`;
      sel.appendChild(opt);
    });
  };
  makeOpts("table-filter");
  makeOpts("table-filter-modal");
}

function getActiveTable(modalMode){
  return modalMode
    ? document.getElementById("table-filter-modal").value
    : document.getElementById("table-filter").value;
}

function getFilteredFields(tableVal){
  if(!tableVal) return FIELDS;
  return FIELDS.filter(f=>f.table===tableVal);
}

function getTop30Fields(pool){
  // 按字段本身的"计算价值"打分，与用户描述无关
  const METRIC_KW   = /gmv|amt|amount|qty|quantity|count|数量|金额|件数|price|价格|rate|比例|占比|销量|revenue|sales|sold|profit|margin|commission|fee|cost/i;
  const DATE_KW     = /date|dt|_day|_month|_week|_year|日期|时间|月|年|周|quarter|season/i;
  const DIM_KW      = /id$|_id|site|categ|category|brand|seller|buyer|item|type|status|level|tier|vertical|segment|country|region|品类|卖家|买家|站点|品牌|类目|层级/i;
  const EXCLUDE_KW  = /remark|备注|注释|comment|desc(?:ription)?$|snapshot|快照|raw|temp|flag|indicator|tag/i;

  const scored = pool.map((f, idx)=>{
    const fl = f.field.toLowerCase();
    const dl = (f.description||"").toLowerCase();
    let s = 100 - idx; // 原始顺序兜底（越靠前越重要）

    if(EXCLUDE_KW.test(fl) || EXCLUDE_KW.test(dl)) s -= 60;
    if(METRIC_KW.test(fl) || METRIC_KW.test(dl))   s += 80;
    if(DATE_KW.test(fl)   || DATE_KW.test(dl))      s += 50;
    if(DIM_KW.test(fl)    || DIM_KW.test(dl))       s += 30;

    return {f, s};
  });
  scored.sort((a,b)=> b.s - a.s);
  return scored.slice(0,30).map(x=>x.f);
}

function onTableChange(){
  const tableVal = document.getElementById("table-filter").value;
  const cnt = getFilteredFields(tableVal).length;
  document.getElementById("table-field-count").textContent =
    tableVal ? `共 ${cnt} 个字段` : "";
  doSearch();
}

(function checkKey(){
  const k = localStorage.getItem("sf_key") || "";
  const badge = document.getElementById("ai-badge");
  if(k){ badge.textContent = "✅ 接口已配置"; badge.style.color = "rgba(200,255,200,.85)"; }
  else  { badge.textContent = ""; }
})();

// ── search ────────────────────────────────────────────────────────────
function onSearch(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 150);
}

function doSearch(){
  const q = document.getElementById("q").value.trim();
  const tableVal = getActiveTable(false);
  const pool = getFilteredFields(tableVal);
  const main = document.getElementById("main");
  if(!q){
    const tableLabel = tableVal ? `表 ${tableVal} 共 ${pool.length} 个字段` : `共加载 ${FIELDS.length} 个字段`;
    main.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>
      <div>在上方输入字段名或中文关键词开始搜索</div>
      <div style="font-size:12px;margin-top:6px;color:#bbb">${tableLabel}</div></div>`;
    return;
  }
  const results = searchFields(q, pool);
  if(!results.length){
    main.innerHTML = renderEmpty(q);
    document.getElementById("btn-smart-search")
      .addEventListener("click", () => aiSearch(window._pendingQuery));
    return;
  }
  const capped = results.slice(0, 50);
  const more = results.length > 50
    ? `<div style="text-align:center;color:#aaa;font-size:12px;padding:8px">仅显示前50条，请缩小关键词范围</div>` : "";
  main.innerHTML =
    `<div class="count">找到 ${results.length} 个相关字段${results.length>50?" （显示前50条）":""}</div>` +
    capped.map(f => renderCard(f, q)).join("") + more;
}

function clearSearch(){
  document.getElementById("q").value = "";
  doSearch();
}

// ── scoring ───────────────────────────────────────────────────────────
function searchFields(q, pool){
  if(!pool) pool = FIELDS;
  const ql = q.toLowerCase();
  const tokens = ql.split(/\s+/).filter(Boolean);
  const scored = pool.map(f => {
    let s = 0;
    const fl = f.field.toLowerCase();
    const dl = f.description.toLowerCase();
    const tl = (f.table + " " + f.table_cn).toLowerCase();
    const gl = f.group.toLowerCase();
    if(fl === ql)          s += 100;
    else if(fl.startsWith(ql)) s += 70;
    else if(fl.includes(ql))   s += 50;
    tokens.forEach(t => { if(dl.includes(t)) s += 40; });
    if(dl.includes(ql))  s += 20;
    if(tl.includes(ql))  s += 15;
    if(gl.includes(ql))  s += 30;
    f.synonyms.forEach(sy => { if(sy.field.toLowerCase().includes(ql)) s += 25; });
    return {f, s};
  }).filter(x => x.s > 0).sort((a,b) => b.s - a.s);
  return scored.map(x => x.f);
}

// ── render ────────────────────────────────────────────────────────────
function renderCard(f, q){
  const verClass = f.verification.startsWith("✅") ? "ver-ok"
                 : f.verification.startsWith("❌") ? "ver-no"
                 : f.verification ? "ver-warn" : "";
  const verBadge = verClass
    ? `<span class="ver-badge ${verClass}">${f.verification.split("：")[0].split("—")[0].trim()}</span>` : "";
  const groupTag = f.group ? `<span class="group-tag">${escHtml(f.group)}</span>` : "";
  const synHtml = f.synonyms.length ? `
    <div class="synonyms">
      <span class="syn-label">同义字段：</span>
      ${f.synonyms.map(s =>
        `<span class="syn-chip" data-jump="${escAttr(s.field)}" title="${escAttr(s.tables)}">${escHtml(s.field)}</span>
         <span class="syn-tables">${escHtml(s.tables)}</span>`
      ).join("")}
    </div>` : "";
  return `<div class="card ${f.group?"has-group":""}" onclick="openFieldDetail('${escAttr(f.field)}','${escAttr(f.table)}')">

    </div>
    <div class="desc">${highlight(f.description, q) || '<span style="color:#ccc">暂无描述</span>'}</div>
    ${synHtml}
  </div>`;
}

// ── helpers ───────────────────────────────────────────────────────────
function highlight(text, q){
  if(!text || !q) return escHtml(text || "");
  let r = escHtml(text);
  q.toLowerCase().split(/\s+/).filter(Boolean).forEach(t => {
    r = r.replace(new RegExp(escRe(t), "gi"), m => `<mark>${m}</mark>`);
  });
  return r;
}
function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function escRe(s)  { return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

// ── 字段校验 & 公式渲染 ────────────────────────────────────────────────
const ADS_SCHEMA = [
  "CATEG_LVL7_NAME","attr_name","attr_value","listing_count",
  "sold_qty","attr_total_sold","rnk","value_pct","cumul_pct"
];
function buildKnownFields(){
  const s = new Set(ADS_SCHEMA.map(f=>f.toLowerCase()));
  FIELDS.forEach(f=>s.add(f.field.toLowerCase()));
  return s;
}
const KNOWN_FIELDS = buildKnownFields();

function validateTableauFormula(formula){
  const matches = formula.match(/\[([^\]]+)\]/g) || [];
  return matches.map(m=>m.slice(1,-1))
    .filter(f=> !KNOWN_FIELDS.has(f.toLowerCase().trim()) && !/^\d/.test(f) && f.trim().length>1);
}

function renderFormulaResult(data){
  if(!(data.sql||data.tableau)) return "";
  const tableauWarnings = data.tableau ? validateTableauFormula(data.tableau) : [];
  const warnHtml = data.tableau ? (tableauWarnings.length ?
    `<div style="background:#fff3e0;border:1px solid #ffb300;border-radius:6px;padding:8px 12px;margin-top:6px;font-size:12px;color:#e65100">
      ⚠️ Tableau公式含未知字段：<strong>${tableauWarnings.map(escHtml).join("、")}</strong><br>
      <span style="color:#999;font-size:11px">请在搜索框核对字段名，或检查大小写</span>
    </div>` :
    `<div style="background:#e8f5e9;border:1px solid #66bb6a;border-radius:6px;padding:6px 12px;margin-top:6px;font-size:12px;color:#2e7d32">✅ 字段名已通过校验，可直接在 Tableau 创建计算字段</div>`) : "";
  const usageHtml = data.usage ?
    `<div style="background:#e3f2fd;border-radius:6px;padding:8px 12px;margin-top:8px;font-size:12px;color:#1565c0">
      💡 <strong>使用建议：</strong>${escHtml(data.usage)}
    </div>` : "";
  const joinHtml = data.join_needed && data.join_hint ?
    `<div style="background:#f3e5f5;border:1px solid #ce93d8;border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;color:#6a1b9a">
      🔗 <strong>需要跨表 JOIN：</strong>
      <div class="formula-box" style="margin-top:6px;background:#2d1b3d">
        <button class="copy-btn" data-copy="${escAttr(data.join_hint)}">复制</button>
        <pre style="color:#e1bee7">${escHtml(data.join_hint)}</pre>
      </div>
    </div>` : "";
  return `
    <div style="border-top:1px solid #f0f0f0;padding-top:12px;margin-top:4px">
    <div style="font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:4px">
      建议字段名：<code style="background:#f5f5f5;padding:2px 6px;border-radius:3px">${escHtml(data.field_name||"")}</code>
    </div>
    ${data.note?`<div style="font-size:12px;color:#666;margin-bottom:8px">${escHtml(data.note)}</div>`:""}
    ${data.sql?`<div class="formula-label">Spark SQL</div>
      <div class="formula-box" style="margin-bottom:8px">
        <button class="copy-btn" data-copy="${escAttr(data.sql)}">复制</button>
        <pre>${escHtml(data.sql)}</pre>
      </div>`:""}
    ${data.tableau?`<div class="formula-label">Tableau</div>
      <div class="formula-box">
        <button class="copy-btn" data-copy="${escAttr(data.tableau)}">复制</button>
        <pre>${escHtml(data.tableau)}</pre>
      </div>${warnHtml}`:""}
    ${usageHtml}
    ${joinHtml}
    </div>`;
}

const FORMULA_SYSTEM = `你是eBay数据仓库专家，同时熟悉Tableau Desktop。

【ADS分析表字段（涉及属性/listing/销量时必须使用，不得自创字段名）】
表名: ads_sg_attr_pareto / dws_sg_attr_value_agg
- CATEG_LVL7_NAME: 品类名称
- attr_name: 属性名（如Color、Size）
- attr_value: 属性值（如Black、L）
- listing_count: listing数量
- sold_qty: 销售数量(件)
- attr_total_sold: 属性总销量
- rnk: 销量排名（1=最畅销）
- value_pct: 属性值占比(%)
- cumul_pct: 累计占比(%)

【Spark SQL 语法规则】
- 字段名直接写，不加括号：sold_qty, listing_count
- 聚合：SUM(), COUNT(), ROUND(x,2), CASE WHEN ... THEN ... ELSE ... END
- 正确: ROUND(SUM(sold_qty)/SUM(listing_count),2)
- 错误: ROUND(AVG(quantity_sold),2) ← 字段名不存在

【Tableau 计算字段语法规则】
- 字段名必须加方括号：[sold_qty], [listing_count]
- 聚合：SUM([field]), AVG([field]), COUNT([field])
- 条件：IF [rnk]<=3 THEN "Top3" ELSE "其他" END
- 正确: ROUND(SUM([sold_qty])/SUM([listing_count]),2)
- 错误: ROUND(AVG(sold_qty),2) ← 缺方括号且字段名错

【Few-shot示例】
需求: 平均每个listing卖出几件
SQL: ROUND(SUM(sold_qty)/SUM(listing_count),2)
Tableau: ROUND(SUM([sold_qty])/SUM([listing_count]),2)
usage: 放在属性值明细图的Label或Tooltip上，体现各属性值的畅销程度

需求: 属性值是否属于Top3畅销
SQL: CASE WHEN rnk<=3 THEN 'Top3' ELSE '其他' END
Tableau: IF [rnk]<=3 THEN "Top3" ELSE "其他" END
usage: 放在Color维度作为分组标记，可在条形图上高亮Top3

需求: 是否已覆盖80%市场
SQL: CASE WHEN cumul_pct>=80 THEN '已覆盖' ELSE '未到80%' END
Tableau: IF SUM([cumul_pct])>=80 THEN "✅已覆盖" ELSE "未到80%" END
usage: 在Pareto曲线上做参考线标注

需求: 近7天交易GMV（用DW表）
SQL: SUM(gmv_amt)
Tableau: SUM([Gmv Amt])
usage: 放在卖家/品类维度的汇总表中

需求: 属性竞争集中度（头部3个值占总销量的比例）
SQL: ROUND(SUM(CASE WHEN rnk<=3 THEN sold_qty ELSE 0 END)*100.0/SUM(sold_qty),1)
Tableau: ROUND(SUM(IF [rnk]<=3 THEN [sold_qty] ELSE 0 END)/SUM([sold_qty])*100,1)
usage: 体现属性的市场集中程度，越高说明买家需求越集中

【跨表JOIN检测】
如果指标需要从多张表取数，必须在join_hint中提供完整SQL框架。
常见JOIN关系（ON条件必须写准确）：
- dw_checkout_trans cki JOIN dw_lstg_item l ON cki.item_id = l.item_id
- dw_checkout_trans cki JOIN Cate_ENG c ON cki.leaf_categ_id = c.leaf_categ_id AND cki.site_id = c.site
- dw_checkout_trans cki JOIN AMS_ERS_NAME a ON cki.slr_id = a.seller_id
- dw_checkout_trans cki JOIN SLR_BYR_MAPPING s ON cki.slr_id = s.slr_id
- dw_lstg_item l JOIN LEAF_ENG le ON l.leaf_categ_id = le.leaf_categ_id
- dw_lstg_item l JOIN CBT_SLR_vertical v ON l.item_id = v.item_id

请生成：
1. Spark SQL计算字段（可直接放在SELECT中）
2. Tableau计算字段公式
返回JSON（所有字段必填）：{"field_name":"建议字段名(英文下划线)","sql":"SQL公式","tableau":"Tableau公式","note":"简短说明","usage":"在Tableau中的使用建议","join_needed":true或false,"join_hint":"若join_needed=true，写出完整SQL框架：SELECT ... FROM tableA a JOIN tableB b ON a.key=b.key WHERE ... 否则留空字符串"}`;

// ── AI（直接调 SiliconFlow）─────────────────────────────────────────
function getSFKey(){
  const k = localStorage.getItem("sf_key") || "";
  if(!k){ openKeyModal(); return null; }
  return k;
}

async function callAI(system, userMsg){
  const key = getSFKey();
  if(!key) return null;
  const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${key}`
    },
    body: JSON.stringify({
      model: "deepseek-ai/DeepSeek-V3",
      max_tokens: 1024,
      messages: [
        {role:"system", content: system},
        {role:"user",   content: userMsg}
      ]
    })
  });
  if(!res.ok){
    const err = await res.text();
    throw new Error(`${res.status}: ${err}`);
  }
  const data = await res.json();
  const text = data.choices?.[0]?.message?.content || "";
  const m = text.match(/\{[\s\S]*\}/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  return {raw: text};
}

async function aiSearch(q){
  const resultDiv = document.getElementById("ai-result");
  resultDiv.innerHTML = `<div style="margin-top:12px;color:#888"><span class="spinner"></span>扫描中…</div>`;
  const ranked = searchFields(q);
  const pool = [...ranked, ...FIELDS.filter(f=>!ranked.includes(f))];
  const ctx = pool.map(f=>`${f.table} | ${f.field} | ${f.description}`).join("\n");
  const system = `你是eBay数据仓库字段专家。用户搜索了某字段/指标但没找到精确匹配。请从提供的字段列表中找出最相关的（最多6个），中文解释相关原因。\n返回JSON：{"suggestions":[{"field":"字段名","table":"表名","description":"字段含义","reason":"相关原因"}]}`;
  try{
    const data = await callAI(system, `用户查询：${q}\n\n字段列表（table | field | description）：\n${ctx}`);
    if(!data) return;
    if(data.suggestions?.length){
      resultDiv.innerHTML = `<div style="margin-top:12px">
        <div style="font-size:13px;font-weight:600;color:#1a3a5c;margin-bottom:8px">找到以下相关字段：</div>
        <div class="ai-suggestions">
          ${data.suggestions.map(s=>`
            <div class="sug-item" data-jump="${escAttr(s.field)}">
              <span class="sug-field">${escHtml(s.field)}</span>
              <span class="table-tag" style="background:#546e7a;font-size:10px;margin-left:8px">${escHtml(s.table||"")}</span>
              <div class="sug-reason">${escHtml(s.reason||s.description||"")}</div>
            </div>`).join("")}
        </div></div>`;
    } else {
      resultDiv.innerHTML = `<div style="margin-top:10px;color:#999;font-size:13px">未找到相关字段，建议使用下方生成计算字段。</div>`;
    }
  }catch(e){
    resultDiv.innerHTML = `<div style="color:#c62828;font-size:13px;margin-top:10px">请求失败：${escHtml(e.message)}</div>`;
  }
}

async function aiGenerate(){
  const desc = document.getElementById("gen-desc").value.trim();
  if(!desc){ alert("请描述你需要的指标"); return; }
  const q = window._pendingQuery || "";
  const tableVal = getActiveTable(false);
  const resultDiv = document.getElementById("ai-result");
  resultDiv.innerHTML = `<div style="margin-top:12px;color:#888"><span class="spinner"></span>生成中…</div>`;
  const pool = getFilteredFields(tableVal);
  const ctx = pool.filter(f=>
    f.description.includes(q)||f.description.includes(desc.slice(0,6))||f.field.toLowerCase().includes(q.toLowerCase())
  ).slice(0,30).map(f=>`${f.table}.${f.field}：${f.description}`).join("\n") ||
  pool.slice(0,30).map(f=>`${f.table}.${f.field}：${f.description}`).join("\n");
  const top30 = getTop30Fields(pool);
  const tableConstraint = tableVal
    ? `\n\n⛔ 用户已锁定数据表：${tableVal}\n只能使用该表的字段，严禁使用其他表的字段。\n最相关的30个字段（按相关度排序）：\n${top30.map(f=>`- ${f.field}：${f.description}`).join("\n")}`
    : "";
  try{
    const data = await callAI(FORMULA_SYSTEM + tableConstraint, `需要的指标：${desc}\n\n可参考的相关字段：\n${ctx}`);
    if(!data) return;
    const html = renderFormulaResult(data);
    if(html){ resultDiv.innerHTML = html; }
    else if(data.raw){ resultDiv.innerHTML = `<pre style="font-size:12px;white-space:pre-wrap;margin-top:10px;background:#f9f9f9;padding:12px;border-radius:6px">${escHtml(data.raw)}</pre>`; }
  }catch(e){
    resultDiv.innerHTML = `<div style="color:#c62828;font-size:13px;margin-top:10px">请求失败：${escHtml(e.message)}</div>`;
  }
}
